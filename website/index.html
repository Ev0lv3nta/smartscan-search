<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartScan</title>

<style>
:root {
  --bg: #f8fafc;
  --text: #0f172a;
  --muted: #475569;
  --border: #e2e8f0;
  --primary: #4e4eb0;
  --primary-hover: #3e3e81;
  --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  --radius: 20px;
  --content-width: 1200px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }

/* Hero */
#hero {
  position: relative;
  width: 100%;
  min-height: 650px;
  display: flex;
  align-items: flex-end;
  color: white;
  overflow: hidden;
}

#hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.35) blur(3px);
  transform: scale(1.05);
}

#hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(15,23,42,0.8),
    rgba(15,23,42,0) 20%,
    rgba(15,23,42,0) 80%,
    rgba(15,23,42,0.8)
  );
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 3rem;
  min-width: 300px;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.hero-title-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

#hero-logo {
  width: 48px;
  height: 48px;
  border-radius: 12px;
}

#hero-title {
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 800;
}

#hero-developer { font-size: 0.85rem; color: var(--primary); }
#hero-tagline { font-size: 1.05rem; color: #f0f4ff; }

.hero-buttons {
  display: flex;
  width: 100%;
  margin-top: 0.75rem;
}

#hero-cta {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  min-width: 200px;
  max-width: 300px;
  padding: 0.75rem 1rem;
  font-weight: 700;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  text-align: center;
  word-break: break-word;
}

#hero-cta:hover {
  background: var(--primary-hover);
}

/* Responsive */
@media (max-width: 860px) {
  #hero {
    min-height: auto;
    padding: 2rem 1rem;
    justify-content: center;
    text-align: center;
  }

  .hero-content {
    padding: 1.5rem;
    max-width: 100%;
    align-items: center;
  }

  .hero-buttons {
    flex-direction: column;
  }
}

/* Desktop CTA behavior */
@media (min-width: 860px) {
  .hero-content { max-width: 50%; }

  #hero-cta {
    /* max-width: 50%; */
    margin:0
  }
}

/* Sections */
#screenshots-container,
#features,
#download {
  max-width: var(--content-width);
  margin: 2rem auto;
  padding: 0 1rem;
}

#screenshots {
  display: flex;
  gap: 1rem;
  overflow-x: auto;
  scrollbar-width: none;       
  -ms-overflow-style: none;    
}
#screenshots::-webkit-scrollbar {
  display: none;                
}
#screenshots img {
  max-width: 250px;
  border-radius: var(--radius);
}

#features ul { padding-left: 2rem; }
#features li { color: var(--muted); }

.download-links {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
}

#download a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 46px;
  padding: 0.75rem 1.15rem;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-weight: 600;
  background: #fff;
  flex-shrink: 0;
}

#download a:hover { box-shadow: var(--shadow); }

</style>
</head>

<body>

<section id="hero">
  <div id="hero-bg"></div>

  <div class="hero-content">
    <div class="hero-title-row">
      <img id="hero-logo" src="" alt="">
      <h1 id="hero-title"></h1>
    </div>

    <span id="hero-developer"></span>
    <p id="hero-tagline"></p>

    <div class="hero-buttons">
      <a href="#download" id="hero-cta">Download</a>
    </div>
  </div>
</section>

<div id="screenshots-container">
  <section id="screenshots"></section>
</div>

<section id="features">
  <h2>Key Features</h2>
  <ul id="features-list"></ul>
</section>

<section id="download">
  <h2>Download</h2>
  <div class="download-links" id="downloads-links"></div>
</section>

<script>
fetch('config.json')
.then(res => res.json())
.then(config => {
  document.title = config.appName || '';

  const logo = document.getElementById('hero-logo');
  if (config.logo) logo.src = config.logo;
  else logo.style.display = 'none';

  document.getElementById('hero-title').textContent = config.appName || '';
  document.getElementById('hero-developer').textContent = config.developer || '';
  document.getElementById('hero-tagline').textContent = config.hero?.tagline || '';

  if (config.hero?.image) {
    document.getElementById('hero-bg').style.backgroundImage = `url('${config.hero.image}')`;
  }

  (config.screenshots || []).forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    document.getElementById('screenshots').appendChild(img);
  });

  (config.features || []).forEach(text => {
    const li = document.createElement('li');
    li.textContent = text;
    document.getElementById('features-list').appendChild(li);
  });

  (config.downloads || []).forEach(d => {
    const a = document.createElement('a');
    a.href = d.url;
    a.textContent = d.label;
    a.target = '_blank';
    document.getElementById('downloads-links').appendChild(a);
  });
});
</script>

</body>
</html>
